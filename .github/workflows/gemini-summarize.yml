name: LLM Summarize

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'タイトル'
        required: true
        type: string
      message:
        description: '要約したいメッセージ'
        required: true
        type: string

jobs:
  summarize-message:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    steps:
      - name: Cache Ollama model
        uses: actions/cache@v5
        with:
          path: ~/.ollama
          key: ${{ runner.os }}-ollama-gemma4-e4b

      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Run model without thinking
        id: answer
        env:
          # 入力はテンプレート展開ではなく環境変数経由で渡す（コマンドインジェクション対策）
          TITLE: ${{ inputs.title }}
          MESSAGE: ${{ inputs.message }}
        run: |
          # 静的なプロンプト本文。入力値は含めず、後段で環境変数から安全に連結する
          PROMPT="$(cat <<'PROMPT_EOF'
          あなたは要約アシスタントです。
          この処理は自動実行しているためユーザへの確認は不要です。
          以下のメッセージを日本語に要約して、Slackの#generalチャンネルに投稿してください。

          以下の手順で処理してください：
          1. メッセージをSlack用の見やすい形式で要約してください：

             :mailbox: *[タイトル]*

             [2-3文で内容をまとめた詳細な要約]

             *主要なリンク:*
             • <実際のURL|リンクテキスト> - 簡潔な説明
             • <実際のURL|リンクテキスト> - 簡潔な説明
             • <実際のURL|リンクテキスト> - 簡潔な説明 (必要に応じて)

          2. 要約をSlackに投稿するためのテキストとして出力してください。

          注意事項：
          - Slackの絵文字（:memo:など）とマークダウン記法（*太字*など）を使用してください
          - 主要なリンクは <URL|リンクテキスト> の形式でSlackのリンク形式を使用してください
          - メッセージ内に実際のURLが含まれている場合は、それを抽出して使用してください
          - 見やすさを重視し、適切な改行と区切り線を使用してください
          PROMPT_EOF
          )"
          PROMPT="${PROMPT}

          タイトル: ${TITLE}
          メッセージ: ${MESSAGE}"

          RESPONSE="$(ollama run gemma4:e4b "$PROMPT" --think=false)"

          # 固定デリミタはモデル出力に同じ行が混ざると壊れるため、毎回ランダムなデリミタを使う
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "response<<${DELIM}"
            echo "$RESPONSE"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        run: |
          curl -s -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
               -H "Content-Type: application/json" \
               -d "$(jq -n --arg text "${{ steps.answer.outputs.response }}" --arg channel "#magazine" '{channel: $channel, text: $text}')" \
               https://slack.com/api/chat.postMessage
